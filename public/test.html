<!DOCTYPE html>
<html>
<body>
<canvas id="c"></canvas>
<div id="status">Loading...</div>
<script>
const status = document.getElementById('status');
fetch('/TITLE.svg')
  .then(r => r.text())
  .then(text => {
    status.innerText = "Loaded SVG text";
    const match = text.match(/href="data:image\/png;base64,([^"]+)"/);
    if (!match) {
      status.innerText = "Base64 not found in SVG";
      return;
    }
    const b64 = match[1];
    const img = new Image();
    img.onload = () => {
      status.innerText = "Loaded Image";
      const c = document.getElementById('c');
      c.width = img.width;
      c.height = img.height;
      const ctx = c.getContext('2d');
      ctx.drawImage(img, 0, 0);
      const d = ctx.getImageData(0,0,c.width,c.height).data;
      let minX=c.width, minY=c.height, maxX=0, maxY=0;
      for(let y=0;y<c.height;y++){
        for(let x=0;x<c.width;x++){
          if(d[(y*c.width+x)*4+3]>0){
            if(x<minX) minX=x; if(x>maxX) maxX=x;
            if(y<minY) minY=y; if(y>maxY) maxY=y;
          }
        }
      }
      const result = [minX, minY, maxX, maxY].join(',');
      document.title = result;
      status.innerText = "Done: " + result;
    };
    img.onerror = () => { status.innerText = "Image load error"; };
    img.src = 'data:image/png;base64,' + b64;
  })
  .catch(err => {
    status.innerText = "Fetch error: " + err.message;
  });
</script>
</body>
</html>
